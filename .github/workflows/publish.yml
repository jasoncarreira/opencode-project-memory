name: Publish Package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm ci
      - name: Verify release tag
        run: node -e 'const expected = `v${require("./package.json").version}`; if (process.env.GITHUB_REF_NAME !== expected) { throw new Error(`release tag ${process.env.GITHUB_REF_NAME} does not match ${expected}`); }'
      - run: npm run check
      - name: Check registry version
        id: registry
        run: >-
          node -e 'const fs = require("node:fs"); const { name, version } = require("./package.json");
          fetch(`https://registry.npmjs.org/${encodeURIComponent(name)}/${encodeURIComponent(version)}`)
          .then((response) => { if (response.status !== 200 && response.status !== 404) throw new Error(`registry lookup failed with HTTP ${response.status}`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `published=${response.status === 200}\n`); });'
      - name: Publish package
        if: steps.registry.outputs.published != 'true'
        run: npm publish
      - name: Report existing package
        if: steps.registry.outputs.published == 'true'
        run: node -e 'console.log(`${require("./package.json").name}@${require("./package.json").version} is already published; skipping npm publish`)'
